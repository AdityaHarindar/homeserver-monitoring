global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # System metrics via node-exporter (runs on host network, port 9100)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']

  # Docker container metrics via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Pi-hole DNS metrics
  - job_name: 'pihole'
    static_configs:
      - targets: ['pihole-exporter:9617']

  # HTTP uptime probing — checks if each service is reachable
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_up]
    static_configs:
      - targets:
          - http://host.docker.internal:80
          - http://host.docker.internal:9001
          - http://host.docker.internal:9002
          - http://host.docker.internal:9003
          - http://host.docker.internal:9004
          - http://host.docker.internal:9005
          - http://host.docker.internal:9006
          - http://host.docker.internal:3000
          - http://host.docker.internal:8581
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: 'https?://[^:]+:(\d+)'
        target_label: port
        replacement: '$1'
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      # Add human-readable service name label
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:80'
        target_label: service
        replacement: 'pihole'
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:9001'
        target_label: service
        replacement: 'qbittorrent'
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:9002'
        target_label: service
        replacement: 'omni-tools'
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:9003'
        target_label: service
        replacement: 'cyberchef'
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:9004'
        target_label: service
        replacement: 'it-tools'
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:9005'
        target_label: service
        replacement: 'stirling-pdf'
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:9006'
        target_label: service
        replacement: 'convertx'
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:3000'
        target_label: service
        replacement: 'homepage'
      - source_labels: [__param_target]
        regex: 'http://host\.docker\.internal:8581'
        target_label: service
        replacement: 'homebridge'
