modules:
  # Accepts any HTTP response (2xx, 3xx, 4xx) — service is "up" if it responds at all
  http_up:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 204, 301, 302, 303, 307, 308, 400, 401, 403, 404, 405]
      method: GET
      follow_redirects: false
      preferred_ip_protocol: "ip4"

  # Strict 2xx only check
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"

  # TCP port check
  tcp_connect:
    prober: tcp
    timeout: 5s

  # DNS check
  dns:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: "ip4"
      query_name: "google.com"
